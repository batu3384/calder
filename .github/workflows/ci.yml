name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          CALDER_SKIP_APP_DEPS: "1"

      - name: Build
        run: npm run build

      - name: Structure guardrails
        run: npm run audit:structure

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Dependency audit
        run: npm audit --omit=dev --audit-level=high

      - name: Run tests with coverage
        run: npm run test:coverage

  deep-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          CALDER_SKIP_APP_DEPS: "1"

      - name: Deep system audit
        run: npm run audit:deep

  native-deps-smoke:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies with native rebuild
        run: npm ci

      - name: Build with node-pty
        run: npm run build
